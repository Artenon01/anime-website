<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="NimeFlix - Platform streaming anime sederhana untuk tugas kuliah dengan koleksi anime terpopuler gratis.">
  <title>NimeFlix - Streaming Anime Sederhana</title>

  <!-- CSS Kustom -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER & NAVIGASI -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        Nime<span>Flix</span>
      </a>
      <ul class="nav-links" id="navbar-links">
        <li><a href="index.html" class="active" id="nav-home">Home</a></li>
      </ul>
    </div>
  </header>

  <!-- KONTEN UTAMA -->
  <main>
    <!-- HERO & PENCARIAN -->
    <section class="hero-section" id="hero">
      <h1>Selamat Datang di <span>NimeFlix</span></h1>
      <p>Tonton koleksi anime terpopuler kamu secara gratis. Cepat, responsif, dan tanpa iklan mengganggu!</p>

      <!-- Box Pencarian -->
      <form id="search-form" class="search-box" onsubmit="event.preventDefault();">
        <input type="text" id="search-input" placeholder="Cari judul anime..." aria-label="Cari judul anime"
          autocomplete="off">
        <button type="submit" id="search-button">Cari</button>
      </form>

      <!-- Filter Genre -->
      <div id="genre-filters-container" class="genre-filters">
        <!-- Genre pills akan di-inject lewat JavaScript -->
      </div>
    </section>

    <!-- LIST ANIME GRID -->
    <section class="anime-section">
      <h2 class="section-title" id="section-title-anime">Daftar Anime Terpopuler</h2>

      <!-- Grid Container yang akan dirender lewat JavaScript -->
      <div id="anime-grid-container" class="anime-grid">
        <!-- Loader animasi saat fetching data -->
        <div class="loading" id="loader">
          <p>Memuat daftar anime...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 <span>NimeFlix</span>. Dibuat dengan &hearts; untuk Tugas Kuliah.</p>
  </footer>

  <!-- Javascript -->
  <script src="js/main.js"></script>
  <script src="js/nav.js"></script>
</body>

</html>
