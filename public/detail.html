<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detail anime terpopuler di NimeFlix beserta daftar episode streaming lengkap.">
  <title>Detail Anime - NimeFlix</title>
  
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER & NAVIGASI -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo" id="nav-logo">
        Nime<span>Flix</span>
      </a>
      <ul class="nav-links" id="navbar-links">
        <li><a href="index.html" id="nav-home">Home</a></li>
      </ul>
    </div>
  </header>

  <!-- KONTEN UTAMA -->
  <main>
    <!-- Tombol Kembali ke Halaman Utama -->
    <a href="index.html" class="back-btn" id="btn-back-home">
      &larr; Kembali ke Home
    </a>

    <!-- Container Utama Detail Anime -->
    <div id="detail-loading" class="loading">
      <p>Memuat info detail anime...</p>
    </div>

    <div id="detail-content" style="display: none;">
      <!-- Section Info Anime (Poster, Judul, Deskripsi) -->
      <section class="anime-detail-container">
        <div class="anime-poster">
          <img id="anime-thumbnail" src="" alt="Poster Anime">
        </div>
        <div class="anime-meta">
          <h1 id="anime-title">Judul Anime</h1>
          
          <div class="genre-tags" id="anime-genres">
            <!-- Genre render dinamis -->
          </div>
          
          <h3>Sinopsis</h3>
          <p class="anime-description" id="anime-desc">Deskripsi sinopsis anime...</p>
        </div>
      </section>

      <!-- Section Daftar Episode -->
      <section class="episode-section">
        <h2 class="section-title">Daftar Episode</h2>
        
        <!-- Grid Episode List -->
        <div class="episode-grid" id="episode-list-container">
          <!-- Episode render dinamis -->
        </div>
      </section>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 <span>NimeFlix</span>. Dibuat dengan &hearts; untuk Tugas Kuliah.</p>
  </footer>

  <!-- Javascript -->
  <script src="js/detail.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
